<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RXP Translator V5</title>
    <style>
        body {
            background-color: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .window {
            width: 480px;
            background: linear-gradient(180deg, #2b2c40 0%, #1a1a2e 100%);
            border: 2px solid #5a5c7a;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .floating-logo {
            position: absolute;
            top: -16px;
            left: -16px;
            width: 55px;
            height: 55px;
            z-index: 10;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.6);
            border: 2px solid #3a3c5a;
            background-color: #151522;
        }
        .header {
            background: linear-gradient(90deg, #1f2032 0%, #151522 100%);
            padding: 8px 12px 8px 45px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #3a3c5a;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
        }
        .header-title {
            display: flex;
            align-items: center;
            font-size: 16px;
            font-weight: bold;
            color: #dcdcdc;
        }
        .header-controls {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .lang-selector {
            background: #2a2a3a;
            color: #dcdcdc;
            border: 1px solid #4a4c6a;
            border-radius: 4px;
            padding: 3px 6px;
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            outline: none;
            margin-right: 4px;
        }
        .lang-selector option {
            background: #151522;
            color: #dcdcdc;
        }
        .btn-icon {
            background: #2a2a3a;
            border: 1px solid #4a4c6a;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            color: white;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
        }
        .btn-close {
            background: #8a2a2a;
            border-color: #aa4a4a;
        }
        .content {
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
        }
        .panel {
            background: #242538;
            border: 1px solid #4a4c6a;
            border-radius: 6px;
            padding: 6px 8px;
            position: relative;
        }
        .panel::before, .panel::after {
            content: '';
            position: absolute;
            width: 5px;
            height: 5px;
            background: #7a7c9a;
            border-radius: 50%;
            box-shadow: inset 1px 1px 2px #111;
        }
        .panel::before { top: 4px; left: 4px; }
        .panel::after { bottom: 4px; right: 4px; }
        .file-row {
            display: flex;
            align-items: center;
            margin-bottom: 4px;
            gap: 6px;
        }
        .file-label {
            width: 45px;
            font-size: 12px;
        }
        .file-input {
            flex-grow: 1;
            background: transparent;
            color: #dcdcdc;
            border: none;
            font-family: monospace;
            font-size: 11px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .btn-standard {
            background: linear-gradient(180deg, #1d3b66 0%, #10223d 100%);
            border: 1px solid #3a5c8c;
            color: #e0e0e0;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            min-width: 80px;
        }
        .btn-standard:hover {
            background: linear-gradient(180deg, #2a4b7c 0%, #1d3b66 100%);
        }
        .btn-standard:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .panel-header {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 15px;
            margin-bottom: 8px;
        }
        .section-title {
            font-size: 14px;
            color: #c0c2cc;
        }
        .target-lang-container {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #dcdcdc;
            font-size: 13px;
        }
        .grid-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }
        .checkbox-item {
            background: #1e1e2f;
            border: 1px solid #3a3c5a;
            padding: 4px 8px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            user-select: none;
        }
        .checkbox-item input[type="checkbox"] {
            accent-color: #3a5c8c;
            width: 13px;
            height: 13px;
        }
        .select-all {
            text-align: center;
            margin-top: 10px;
            color: #b8bacc;
            font-size: 13px;
            cursor: pointer;
            user-select: none;
            transition: color 0.2s ease;
        }
        .select-all:hover {
            color: #ffffff;
        }
        .actions-row {
            display: flex;
            gap: 8px;
        }
        .btn-large {
            flex-grow: 1;
            padding: 6px;
            font-size: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
            background: linear-gradient(180deg, #1d3b66 0%, #10223d 100%);
            border: 1px solid #3a5c8c;
            color: #e0e0e0;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-large:hover {
            background: linear-gradient(180deg, #2a4b7c 0%, #1d3b66 100%);
        }
        .btn-large:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-large.active {
            background: linear-gradient(180deg, #3a6b9c 0%, #2a4b7c 100%);
            border-color: #5a8cbc;
        }
        .btn-folder {
            width: 40px;
            flex-grow: 0;
            background: linear-gradient(180deg, #2b2c40 0%, #1a1a2e 100%);
        }
        .btn-stop {
            width: 43px;
            flex-grow: 0;
            padding: 8px;
            font-size: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, #6b2020 0%, #4a1515 100%);
            border: 1px solid #8a3a3a;
            color: #e0e0e0;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-stop:hover {
            background: linear-gradient(180deg, #8a3030 0%, #6b2020 100%);
        }
        .progress-container {
            background: #11111a;
            border: 1px solid #3a3c5a;
            border-radius: 4px;
            height: 22px;
            position: relative;
            overflow: hidden;
        }
        .progress-bar {
            background: linear-gradient(90deg, #2a4b7c 0%, #4a6c9c 100%);
            width: 0%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            transition: width 0.3s ease;
        }
        .progress-text-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 1px #000;
        }
        .stats-text {
            text-align: center;
            font-size: 13px;
            color: #dcdcdc;
            margin-top: 6px;
        }
        .log-box {
            background: #151522;
            border: 1px solid #3a3c5a;
            border-radius: 4px;
            padding: 6px;
            font-family: monospace;
            font-size: 11px;
            color: #dcdcdc;
            height: 60px;
            overflow-y: auto;
            line-height: 1.4;
            white-space: pre-wrap;
            word-wrap: break-word;
            user-select: text;
            -webkit-user-select: text;
            cursor: text;
        }
        .log-title {
            text-align: center;
            font-size: 13px;
            margin-bottom: 4px;
        }
        .log-box::-webkit-scrollbar { width: 6px; }
        .log-box::-webkit-scrollbar-track { background: #11111a; }
        .log-box::-webkit-scrollbar-thumb { background: #3a3c5a; border-radius: 3px; }

        /* ── Context menu ── */
        .context-menu {
            display: none;
            position: fixed;
            background: linear-gradient(180deg, #2b2c40 0%, #1a1a2e 100%);
            border: 1px solid #5a5c7a;
            border-radius: 6px;
            padding: 4px 0;
            z-index: 200;
            min-width: 160px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }
        .context-menu.active { display: block; }
        .context-menu-item {
            padding: 8px 16px;
            color: #dcdcdc;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .context-menu-item:hover {
            background: rgba(90,140,188,0.2);
            color: #fff;
        }
        .context-menu-item .shortcut {
            margin-left: auto;
            color: #6B72A8;
            font-size: 11px;
        }

        /* ── Loading spinner ── */
        .loading-indicator {
            display: none;
            align-items: center;
            gap: 8px;
            justify-content: center;
            padding: 4px 0;
        }
        .loading-indicator.active {
            display: flex;
        }
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #3a3c5a;
            border-top: 2px solid #5a8cbc;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            font-size: 12px;
            color: #8a8caa;
            animation: pulse-text 1.5s ease-in-out infinite;
        }
        @keyframes pulse-text {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        .loading-dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
        }

        /* ── Help modal ── */
        .help-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .help-overlay.active {
            display: flex;
        }
        .help-modal {
            background: linear-gradient(180deg, #2b2c40 0%, #1a1a2e 100%);
            border: 2px solid #5a5c7a;
            border-radius: 10px;
            width: 460px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 20px;
            color: #dcdcdc;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .help-modal::-webkit-scrollbar { width: 6px; }
        .help-modal::-webkit-scrollbar-track { background: #1a1a2e; }
        .help-modal::-webkit-scrollbar-thumb { background: #3a3c5a; border-radius: 3px; }
        .help-title {
            font-size: 18px;
            font-weight: bold;
            color: #5a8cbc;
            margin-bottom: 15px;
            text-align: center;
            border-bottom: 1px solid #3a3c5a;
            padding-bottom: 10px;
        }
        .help-section {
            margin-bottom: 15px;
        }
        .help-section h3 {
            font-size: 14px;
            color: #5a8cbc;
            margin: 10px 0 6px 0;
        }
        .help-section p, .help-section li {
            font-size: 13px;
            color: #b8bacc;
            line-height: 1.6;
            margin: 4px 0;
        }
        .help-section ul {
            padding-left: 20px;
            margin: 6px 0;
        }
        .help-close {
            display: block;
            margin: 15px auto 0;
            background: linear-gradient(180deg, #1d3b66 0%, #10223d 100%);
            border: 1px solid #3a5c8c;
            color: #e0e0e0;
            padding: 8px 30px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .help-close:hover {
            background: linear-gradient(180deg, #2a4b7c 0%, #1d3b66 100%);
        }
        .help-x-btn { position: absolute; top: 10px; right: 14px; background: #8a2a2a; border: 1px solid #aa4a4a; border-radius: 50%; width: 26px; height: 26px; color: white; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 14px; font-weight: bold; z-index: 10; }
        .help-x-btn:hover { background: #aa3a3a; }
        .help-modal { position: relative; }
    </style>
</head>
<body>

<div class="window">
    <img src="https://www.restedxp.com/images/rxplogoanimated.gif" alt="RXP Logo" class="floating-logo">

    <div class="header">
        <div class="header-title">RXP Translator V5</div>
        <div class="header-controls">
            <select class="lang-selector" id="languageSelect">
                <option value="es" selected>Español</option>
                <option value="en">English</option>
                <option value="pt">Português</option>
                <option value="de">Deutsch</option>
                <option value="fr">Français</option>
                <option value="ru">Русский</option>
                <option value="zh-tw">繁體中文</option>
                <option value="zh-cn">简体中文</option>
            </select>
            <button class="btn-icon" onclick="toggleHelp()">?</button>
            <button class="btn-icon btn-close" onclick="closeApp()">✕</button>
        </div>
    </div>

    <div class="content">
        <!-- Archivos -->
        <div class="panel">
            <div class="file-row">
                <span class="file-label" data-i18n="lbl-guide">Guía:</span>
                <span class="file-input" id="guidePath">[Seleccionar guía...]</span>
                <button class="btn-standard" onclick="selectGuide()"><span data-i18n="btn-folder">📁 Carpeta</span></button>
            </div>
            <div class="file-row" style="margin-bottom: 0;">
                <span class="file-label" data-i18n="lbl-output">Salida:</span>
                <span class="file-input" id="outputPath">output\</span>
                <button class="btn-standard" onclick="selectOutput()"><span data-i18n="btn-open-folder">Abrir Carpeta</span></button>
            </div>
        </div>

        <!-- Opciones de traducción -->
        <div class="panel">
            <div class="panel-header">
                <div class="section-title" data-i18n="title-translate">TRADUCIR</div>
                <div class="target-lang-container">
                    <span data-i18n="lbl-to">a:</span>
                    <select class="lang-selector" id="targetLangSelect">
                        <option value="esES">Español (EU)</option>
                        <option value="esMX">Español (AL)</option>
                        <option value="ptBR">Português</option>
                        <option value="deDE">Deutsch</option>
                        <option value="frFR">Français</option>
                        <option value="ruRU">Русский</option>
                        <option value="koKR">한국어</option>
                        <option value="zhTW">繁體中文</option>
                        <option value="zhCN">简体中文</option>
                    </select>
                </div>
            </div>
            <div class="grid-2col">
                <label class="checkbox-item"><input type="checkbox" id="chk-npcs" checked> <span data-i18n="chk-npcs">NPCs/Enemigos</span></label>
                <label class="checkbox-item"><input type="checkbox" id="chk-items" checked> <span data-i18n="chk-items">Items</span></label>
                <label class="checkbox-item"><input type="checkbox" id="chk-world" checked> <span data-i18n="chk-world">Objetos mundo</span></label>
                <label class="checkbox-item"><input type="checkbox" id="chk-quests" checked> <span data-i18n="chk-quests">Misiones</span></label>
                <label class="checkbox-item"><input type="checkbox" id="chk-zones" checked> <span data-i18n="chk-zones">Zonas</span></label>
                <label class="checkbox-item"><input type="checkbox" id="chk-subzones" checked> <span data-i18n="chk-subzones">Subzonas</span></label>
                <label class="checkbox-item"><input type="checkbox" id="chk-instructions" checked> <span data-i18n="chk-instructions">Instrucciones</span></label>
                <label class="checkbox-item"><input type="checkbox" id="chk-skills" checked> <span data-i18n="chk-skills">Habilidades</span></label>
            </div>
            <div class="select-all" id="selectAllBtn" data-i18n="btn-select-all">✨ Seleccionar todo ✨</div>
        </div>

        <!-- Botones de acción -->
        <div class="actions-row">
            <button class="btn-large" id="btnTranslate" onclick="doTranslate()"><span data-i18n="btn-translate-action">▶ Traducir</span></button>
            <button class="btn-stop" id="btnStop" onclick="doStop()"><span data-i18n="btn-stop">⏹</span></button>
            <button class="btn-large" id="btnValidate" onclick="doValidate()"><span data-i18n="btn-validate">🔍 Validar</span></button>
            <button class="btn-large btn-folder" onclick="openOutput()">📂</button>
        </div>
        
        <!-- Botón traducir interfaz del addon -->
        <div class="panel" style="margin-top: 4px; padding: 6px 8px;">
            <div style="display:flex; align-items:center; gap:6px; margin-bottom:4px;">
                <div class="section-title" data-i18n="title-addon-interface" style="font-size:12px;">INTERFAZ DEL ADDON</div>
                <select class="lang-selector" id="addonLangSelect" style="font-size:11px; padding:2px 4px;">
                    <option value="esES">esES</option>
                    <option value="esMX">esMX</option>
                    <option value="ptBR">ptBR</option>
                    <option value="deDE">deDE</option>
                    <option value="frFR">frFR</option>
                    <option value="ruRU">ruRU</option>
                    <option value="koKR">koKR</option>
                    <option value="zhTW">zhTW</option>
                    <option value="zhCN">zhCN</option>
                </select>
            </div>
            <div style="display: flex; gap: 4px; align-items: center;">
                <span data-i18n="lbl-addon-folder" style="font-size:12px;">Addon:</span>
                <span class="file-input" id="addonPath" style="flex:1; font-size:11px;">[Seleccionar carpeta...]</span>
                <button class="btn-standard" onclick="selectAddonFolder()" style="padding:4px 8px; font-size:11px; min-width:auto;"><span data-i18n="btn-addon-folder">📁</span></button>
                <button class="btn-large" id="btnTranslateAddon" onclick="doTranslateAddon()" style="padding:4px 8px; font-size:11px; flex:0 0 auto; width:auto;"><span data-i18n="btn-translate-addon">🌐 Traducir</span></button>
            </div>
        </div>

        <!-- Loading indicator -->
        <div class="loading-indicator" id="loadingIndicator">
            <div class="spinner"></div>
            <span class="loading-text"><span data-i18n="loading-text">Procesando</span><span class="loading-dots"></span></span>
        </div>

        <!-- Progreso -->
        <div>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
                <div class="progress-text-overlay" id="progressText">0%</div>
            </div>
            <div class="stats-text" id="stats-text">Listo</div>
        </div>

        <!-- Log -->
        <div class="panel" style="padding-top: 4px;">
            <div class="log-title" data-i18n="log-title">Log</div>
            <div class="log-box" id="logBox"></div>
        </div>
    </div>
</div>

<!-- Context Menu (must be before script) -->
<div class="context-menu" id="contextMenu">
    <div class="context-menu-item" onclick="contextCopy()">📋 Copiar <span class="shortcut">Ctrl+C</span></div>
    <div class="context-menu-item" onclick="contextSelectAll()">☑️ Seleccionar todo <span class="shortcut">Ctrl+A</span></div>
</div>

<!-- Help Modal (must be before script) -->
<div class="help-overlay" id="helpOverlay" onclick="if(event.target===this)toggleHelp()">
    <div class="help-modal" id="helpModalContent">
        <button class="help-x-btn" onclick="toggleHelp()" title="Cerrar">✕</button>
    </div>
</div>

<!-- QWebChannel library (injected by PyQt5) -->
<script src="qrc:///qtwebchannel/qwebchannel.js"></script>

<script>

    const contextMenu = document.getElementById('contextMenu');
    let contextTarget = null;

    document.addEventListener('contextmenu', function(e) {
        // Only show on log box or text-selectable elements
        const logBox = document.getElementById('logBox');
        if (logBox && (logBox.contains(e.target) || e.target === logBox)) {
            e.preventDefault();
            contextTarget = logBox;
            contextMenu.style.left = e.clientX + 'px';
            contextMenu.style.top = e.clientY + 'px';
            contextMenu.classList.add('active');
        }
    });

    document.addEventListener('click', function() {
        contextMenu.classList.remove('active');
    });

    function contextCopy() {
        const selection = window.getSelection().toString();
        if (selection) {
            navigator.clipboard.writeText(selection);
        }
        contextMenu.classList.remove('active');
    }

    function contextSelectAll() {
        if (contextTarget) {
            const range = document.createRange();
            range.selectNodeContents(contextTarget);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
        }
        contextMenu.classList.remove('active');
    }

    // ── Help modal ──

    const helpContent = {
        es: {
            title: "❓ RXP Translator V5 — Ayuda",
            s1h: "🎮 ¿Qué es este programa?", s1p: "RXP Translator es una herramienta que traduce las guías del addon <strong>RestedXP</strong> de World of Warcraft a tu idioma.", s1p2: "RestedXP es un addon que te muestra paso a paso cómo subir de nivel tu personaje. Las guías originales están en inglés. Este programa las traduce para que las entiendas mejor.",
            s2h: "📋 ¿Cómo funciona? (Paso a paso)", s2li: ['<strong>Paso 1:</strong> Haz clic en <strong>📁 Carpeta</strong> junto a "Guía" para seleccionar el archivo .lua de la guía.', '<strong>Paso 2:</strong> (Opcional) Haz clic en <strong>Abrir Carpeta</strong> junto a "Salida" para elegir dónde se guardará.', '<strong>Paso 3:</strong> Elige el idioma en el menú desplegable <strong>"a:"</strong>.', '<strong>Paso 4:</strong> Marca las casillas de lo que quieres traducir. Recomendado: dejar todas marcadas.', '<strong>Paso 5:</strong> Haz clic en <strong>▶ Traducir</strong> y espera. Verás el progreso abajo.', '<strong>Paso 6:</strong> Haz clic en <strong>📂</strong> para abrir la carpeta con tu guía traducida.', '<strong>Paso 7:</strong> Copia el archivo traducido a la carpeta de guías de RestedXP en tu juego.'],

    function renderHelp(lang) {
        const h = helpContent[lang] || helpContent['es'];
        let html = `<button class="help-x-btn" onclick="toggleHelp()" title="Cerrar">✕</button>`;
        html += `<div class="help-title">${h.title}</div>`;
        html += `<div class="help-section"><h3>${h.s1h}</h3><p>${h.s1p}</p><p>${h.s1p2}</p></div>`;
        html += `<div class="help-section"><h3>${h.s2h}</h3><ul>${h.s2li.map(i=>'<li>'+i+'</li>').join('')}</ul></div>`;
        html += `<div class="help-section"><h3>${h.s3h}</h3><p>${h.s3p}</p><p><code>C:\\World of Warcraft\\_classic_\\Interface\\AddOns\\RXPGuides\\Guides\\</code></p><p>${h.s3p2}</p></div>`;
        html += `<div class="help-section"><h3>${h.s4h}</h3><p>${h.s4p}</p><p>${h.s4p2}</p></div>`;
        html += `<div class="help-section"><h3>${h.s5h}</h3><ul>${h.s5li.map(i=>'<li>'+i+'</li>').join('')}</ul></div>`;
        html += `<div class="help-section"><h3>${h.s6h}</h3><ul>${h.s6li.map(i=>'<li>'+i+'</li>').join('')}</ul></div>`;
        html += `<div class="help-section"><h3>${h.s7h}</h3><p>${h.s7p}</p></div>`;
        html += `<div class="help-section"><h3>${h.s8h}</h3><ul>${h.s8li.map(i=>'<li>'+i+'</li>').join('')}</ul></div>`;
        html += `<button class="help-close" onclick="toggleHelp()">${h.close}</button>`;
        document.getElementById('helpModalContent').innerHTML = html;
    }

    function toggleHelp() {
        const overlay = document.getElementById('helpOverlay');
        if (!overlay.classList.contains('active')) {
            const lang = document.getElementById('languageSelect').value;
            renderHelp(lang);
        }
        overlay.classList.toggle('active');
    }

    // ── Loading animation ──

    function startLoading() {
        document.getElementById('loadingIndicator').classList.add('active');
    }

    function stopLoading() {
        document.getElementById('loadingIndicator').classList.remove('active');
    }

    function pulseLoading() {
        // Visual pulse to confirm the app is alive
        const el = document.getElementById('loadingIndicator');
        el.style.opacity = '0.6';
        setTimeout(() => { el.style.opacity = '1'; }, 200);
    }

    // ── Funciones de interfaz ──

    function addLog(msg) {
        const box = document.getElementById('logBox');
        box.innerHTML += msg + '\n';
        box.scrollTop = box.scrollHeight;
    }

    function updateProgress(pct, text) {
        document.getElementById('progressBar').style.width = pct + '%';
        document.getElementById('progressText').textContent = pct + '%';
        if (text) document.getElementById('stats-text').textContent = text;
    }

    // ── Botones conectados a Python (QWebChannel) ──

    let bridge = null;

    function initBridge() {
        if (typeof QWebChannel !== 'undefined') {
            new QWebChannel(qt.webChannelTransport, function(channel) {
                bridge = channel.objects.bridge;
                addLog('✅ RXP Translator V5 — Listo');
            });
        }
    }

    async function selectGuide() {
        if (!bridge) return;
        const raw = await bridge.select_guide_files();
        const result = JSON.parse(raw);
        if (result.files.length > 0) {
            document.getElementById('guidePath').textContent = result.names.join(', ');
        }
    }

    async function selectOutput() {
        if (!bridge) return;
        const raw = await bridge.select_output_dir();
        const result = JSON.parse(raw);
        if (result.dir) document.getElementById('outputPath').textContent = result.dir;
    }

    function openOutput() { if (bridge) bridge.open_output_folder(); }

    async function doTranslate() {
        if (!bridge) return;
        const locale = document.getElementById('targetLangSelect').value;
        const cats = {};
        ['npcs','items','world','quests','zones','subzones','instructions','skills'].forEach(k => {
            cats[k] = document.getElementById('chk-'+k).checked;
        });
        document.getElementById('btnTranslate').classList.add('active');
        await bridge.translate(locale, JSON.stringify(cats));
        document.getElementById('btnTranslate').classList.remove('active');
    }

    async function doValidate() {
        if (!bridge) return;
        document.getElementById('btnValidate').classList.add('active');
        await bridge.validate();
        document.getElementById('btnValidate').classList.remove('active');
    }

    function closeApp() {
        window.close();
    }

    function doStop() {
        if (bridge) bridge.stop_translation();
    }
    
    // ── Addon Interface Translation ──
    async function selectAddonFolder() {
        if (!bridge) return;
        const raw = await bridge.select_addon_folder();
        const result = JSON.parse(raw);
        if (result.dir) document.getElementById('addonPath').textContent = result.dir;
    }
    
    async function doTranslateAddon() {
        if (!bridge) return;
        const locale = document.getElementById('addonLangSelect').value;
        document.getElementById('btnTranslateAddon').classList.add('active');
        await bridge.translate_addon_interface(locale);
        document.getElementById('btnTranslateAddon').classList.remove('active');
    }

    // ── Window drag via header ──
    let isDragging = false;

    document.addEventListener('mousedown', function(e) {
        const header = document.querySelector('.header');
        if (header && header.contains(e.target) && !e.target.closest('.header-controls')) {
            isDragging = true;
            if (bridge) bridge.start_drag();
        }
    });

    document.addEventListener('mousemove', function(e) {
        if (isDragging && bridge) {
            bridge.do_drag(e.screenX, e.screenY);
        }
    });

    document.addEventListener('mouseup', function() {
        if (isDragging) {
            isDragging = false;
            if (bridge) bridge.stop_drag();
        }
    });

    // ── Seleccionar todo ──

    document.getElementById('selectAllBtn').addEventListener('click', function() {
        const checkboxes = document.querySelectorAll('.grid-2col input[type="checkbox"]');
        const allChecked = Array.from(checkboxes).every(cb => cb.checked);
        checkboxes.forEach(cb => { cb.checked = !allChecked; });

    function applyLang(selectedLang) {
        const dict = translations[selectedLang];
        if (!dict) return;
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (!dict[key]) return;
            // Use textContent for simple labels, innerHTML only for help modal content
            if (el.closest('#helpModalContent')) {
                el.innerHTML = dict[key];
            } else {
                el.textContent = dict[key];
            }
        });
    }

    document.getElementById('languageSelect').addEventListener('change', function(e) {
        const selectedLang = e.target.value;
        applyLang(selectedLang);
        if (bridge) bridge.set_language(selectedLang);
    });

    // ── Initialize QWebChannel ──
    if (typeof qt !== 'undefined') {
        initBridge();
    } else {
        // Fallback: wait for Qt to load
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(initBridge, 100);
